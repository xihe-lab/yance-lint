name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string
      channel:
        description: 'Release channel'
        required: true
        default: 'eap'
        type: choice
        options:
          - eap
          - beta
          - stable

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Determine Version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            CHANNEL="${{ github.event.inputs.channel }}"
          else
            # Extract version from tag (v1.0.0 -> 1.0.0)
            VERSION="${GITHUB_REF#refs/tags/v}"
            # Determine channel from version format
            if [[ "$VERSION" =~ -EAP ]]; then
              CHANNEL="eap"
            elif [[ "$VERSION" =~ -beta ]]; then
              CHANNEL="beta"
            else
              CHANNEL="stable"
            fi
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT

      - name: Update Version in Build
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/version = \".*\"/version = \"$VERSION\"/" yance-lint/build.gradle.kts
          sed -i "s/version = \".*\"/version = \"$VERSION\"/" yance-lint/src/main/kotlin/com/xihe_lab/yance/idea/server/LintHttpServer.kt 2>/dev/null || true

      - name: Build Plugin
        run: gradle :yance-lint:buildPlugin --no-daemon

      - name: Get Plugin Path
        id: plugin
        run: |
          PLUGIN_PATH=$(ls yance-lint/build/distributions/*.zip)
          echo "path=$PLUGIN_PATH" >> $GITHUB_OUTPUT
          echo "name=$(basename $PLUGIN_PATH)" >> $GITHUB_OUTPUT

      - name: Publish to JetBrains Marketplace
        if: ${{ env.JETBRAINS_TOKEN != '' }}
        env:
          JETBRAINS_TOKEN: ${{ secrets.JETBRAINS_TOKEN }}
        run: |
          gradle :yance-lint:publishPlugin --no-daemon
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: YanceLint ${{ steps.version.outputs.version }}
          tag_name: v${{ steps.version.outputs.version }}
          files: ${{ steps.plugin.outputs.path }}
          body: |
            ## YanceLint ${{ steps.version.outputs.version }}

            ### 安装方式
            - IDE 内安装：Settings → Plugins → 搜索 "YanceLint"
            - 直接安装：[点击安装](https://plugins.jetbrains.com/embeddable/install/31337)

            ### MCP Server 配置
            ```json
            {
              "mcpServers": {
                "yancelint": {
                  "command": "npx",
                  "args": ["-y", "@xihe-lab/yance-mcp-server"]
                }
              }
            }
            ```

            详细文档见 [README](https://github.com/xihe-lab/yance-idea#readme)
          draft: false
          prerelease: ${{ steps.version.outputs.channel != 'stable' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
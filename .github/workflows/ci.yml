name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Plugin
        run: gradle :yance-lint:buildPlugin --no-daemon

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: yance-lint-plugin
          path: yance-lint/build/distributions/*.zip
          retention-days: 7

  release-eap:
    needs: build
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate EAP Version
        id: version
        run: |
          BASE_VERSION="1.0.0"
          BUILD_NUM="${{ github.run_number }}"
          VERSION="${BASE_VERSION}-EAP.${BUILD_NUM}"
          TAG="v${VERSION}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Generated EAP version: $VERSION, tag: $TAG"

      - name: Update Version in Build
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/version = \".*\"/version = \"$VERSION\"/" yance-lint/build.gradle.kts

      - name: Build Plugin
        run: gradle :yance-lint:buildPlugin --no-daemon

      - name: Publish to JetBrains Marketplace
        env:
          JETBRAINS_TOKEN: ${{ secrets.JETBRAINS_TOKEN }}
        run: gradle :yance-lint:publishPlugin --no-daemon
        continue-on-error: true

      - name: Push EAP Tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "EAP auto-release ${{ steps.version.outputs.version }}"
          git push origin "$TAG"

      - name: Get Plugin Path
        id: plugin
        run: |
          PLUGIN_PATH=$(ls yance-lint/build/distributions/*.zip)
          echo "path=$PLUGIN_PATH" >> $GITHUB_OUTPUT
          echo "name=$(basename $PLUGIN_PATH)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: YanceLint EAP ${{ steps.version.outputs.version }}
          tag_name: ${{ steps.version.outputs.tag }}
          files: ${{ steps.plugin.outputs.path }}
          body: |
            ## YanceLint EAP ${{ steps.version.outputs.version }}

            Auto-published from `develop` branch (build #${{ github.run_number }})

            Commit: ${{ github.sha }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
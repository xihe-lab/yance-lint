name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Plugin
        run: gradle :yance-lint:buildPlugin --no-daemon

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: yance-lint-plugin
          path: yance-lint/build/distributions/*.zip
          retention-days: 7